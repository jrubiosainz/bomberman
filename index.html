<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💣 Bomberman Revolution 💣</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(30, 0, 60, 0.4) 0%, transparent 70%),
                  radial-gradient(ellipse at 80% 20%, rgba(60, 0, 30, 0.3) 0%, transparent 50%),
                  radial-gradient(ellipse at 20% 80%, rgba(0, 30, 60, 0.3) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      z-index: -1;
    }
    
    @keyframes bgPulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    
    canvas {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100, 50, 200, 0.3),
                  0 0 80px rgba(100, 50, 200, 0.1),
                  inset 0 0 20px rgba(0, 0, 0, 0.5);
    }
    
    .controls {
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      text-align: center;
      letter-spacing: 1px;
    }
    
    .controls kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="900" height="600"></canvas>
  <div class="controls">
    <kbd>↑↓←→</kbd> Move &nbsp;|&nbsp; <kbd>SPACE</kbd> Bomb &nbsp;|&nbsp; <kbd>ENTER</kbd> Select &nbsp;|&nbsp; <kbd>ESC</kbd> Back &nbsp;|&nbsp; <kbd>R</kbd> Restart
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
